<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLAR DASH</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
}

/* ================= GAME ================= */
#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
    background:linear-gradient(#FFD89B,#87CEEB);
    transition:background 1s ease;
}

#player{
    position:absolute;
    left:80px;
    bottom:100px;

    width:40px;
    height:80px;

    z-index:10;
    filter:
        drop-shadow(0 2px 2px rgba(0,0,0,0.3))      
}

/* ===== HEAD ===== */
#player .head{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#1a1a1a;
    left:11px;
    top:0;
}

/* ===== BODY ===== */
#player .body{
    position:absolute;
    width:6px;
    height:32px;
    background:#1a1a1a;
    left:17px;
    top:18px;
    border-radius:10px;
}

/* ===== ARMS ===== */
#player .arm{
    position:absolute;
    width:5px;
    height:24px;
    background:#1a1a1a;
    top:22px;
    left:17px;

    transform-origin:top center;
    border-radius:10px;
}

/* kiri & kanan */
.arm-left{
    animation:armRun 0.55s infinite ease-in-out;
}

.arm-right{
    animation:armRunReverse 0.55s infinite ease-in-out;
}

/* ===== LEGS ===== */
#player .leg{
    position:absolute;
    width:6px;
    height:28px;
    background:#1a1a1a;
    top:48px;
    left:17px;

    transform-origin:top center;
    border-radius:10px;
}

.leg-left{
    animation:legRun 0.55s infinite ease-in-out;
}

.leg-right{
    animation:legRunReverse 0.55s infinite ease-in-out;
}

#game:not(.is-playing) #player .arm,
#game:not(.is-playing) #player .leg{
    animation-play-state:paused;
}

/* ===== RUN ANIMATION ===== */

@keyframes armRun{
    0%   { transform:rotate(-40deg); }
    50%  { transform:rotate(40deg); }
    100% { transform:rotate(-40deg); }
}

@keyframes armRunReverse{
    0%   { transform:rotate(40deg); }
    50%  { transform:rotate(-40deg); }
    100% { transform:rotate(40deg); }
}

@keyframes legRun{
    0%   { transform:rotate(35deg); }
    50%  { transform:rotate(-35deg); }
    100% { transform:rotate(35deg); }
}

@keyframes legRunReverse{
    0%   { transform:rotate(-35deg); }
    50%  { transform:rotate(35deg); }
    100% { transform:rotate(-35deg); }
}

/* ================= KAKTUS PREMIUM ================= */

.obstacle{
    position:absolute;
    bottom:100px;

    width:50px;
    height:100px;

    border-radius:22px 22px 10px 10px;

    background:
    repeating-linear-gradient(
        90deg,
        #2D6A4F 0px,
        #2D6A4F 8px,
        #40916C 8px,
        #40916C 12px
    );

    box-shadow:
        inset 4px 0 rgba(255,255,255,0.15),
        inset -4px 0 rgba(0,0,0,0.20),
        0 0 8px rgba(0,0,0,0.15);

    z-index:10;
}

/* ================= CABANG KIRI ================= */

.obstacle::before{
    content:"";

    position:absolute;

    width:24px;
    height:45px;

    left:-16px;
    top:38px;

    border-radius:15px 15px 8px 8px;

    background:
    repeating-linear-gradient(
        90deg,
        #40916C 0px,
        #40916C 6px,
        #52B788 6px,
        #52B788 10px
    );

    box-shadow:
        inset 2px 0 rgba(255,255,255,0.15),
        inset -2px 0 rgba(0,0,0,0.15);
}

/* ================= CABANG KANAN ================= */

.obstacle::after{
    content:"";

    position:absolute;

    width:24px;
    height:55px;

    right:-16px;
    top:15px;

    border-radius:15px 15px 8px 8px;

    background:
    repeating-linear-gradient(
        90deg,
        #40916C 0px,
        #40916C 6px,
        #52B788 6px,
        #52B788 10px
    );

    box-shadow:
        inset 2px 0 rgba(255,255,255,0.15),
        inset -2px 0 rgba(0,0,0,0.15);
}

/* ================= DURI KECIL ================= */

.obstacle{
    overflow:visible;
}

.obstacle::selection{
    display:none;
}

/* ================= EFEK MALAM ================= */

@keyframes cactusGlow{
    0%,100%{
        filter:brightness(1);
    }

    50%{
        filter:brightness(1.08);
    }
}

.obstacle{
    animation:cactusGlow 3s infinite ease-in-out;
}

/* ================= BIRD ================= */
.bird{
    position:absolute;
    font-size:80px;
    bottom:200px;
    z-index:3
}

/* ================= DESERT HILLS PREMIUM FIX ================= */

#groundBack{
    position:absolute;
    bottom:70px;
    width:100%;
    height:350px; /* diperbesar agar bukit tidak terpotong */

    background:

    /* ===== bukit belakang ===== */
    radial-gradient(circle at 10% 100%, #E0B15C 0 120px, transparent 121px),
    radial-gradient(circle at 45% 100%, #E0B15C 0 160px, transparent 161px),
    radial-gradient(circle at 85% 100%, #E0B15C 0 130px, transparent 131px),

    /* ===== bukit tengah ===== */
    radial-gradient(circle at 25% 100%, #D18F2E 0 180px, transparent 181px),
    radial-gradient(circle at 70% 100%, #D18F2E 0 220px, transparent 221px),

    /* ===== bukit depan ===== */
    radial-gradient(circle at 0% 100%, #B96D1F 0 220px, transparent 221px),
    radial-gradient(circle at 50% 100%, #B96D1F 0 280px, transparent 281px),
    radial-gradient(circle at 100% 100%, #B96D1F 0 220px, transparent 221px);

    background-repeat:repeat-x;
    background-size:1400px 380px;

    filter:
        brightness(1.1)
        saturate(1.15)
        drop-shadow(0 -8px 15px rgba(0,0,0,0.25));

    z-index:1;
}

/* ================= FOG BLOBS PREMIUM ================= */

#groundBack::after{
    content:"";
    position:absolute;
    inset:0;

    background:

    radial-gradient(
        ellipse 250px 70px at 5% 100%,
        rgba(255,240,220,0.22) 0%,
        rgba(255,240,220,0.12) 45%,
        transparent 100%
    ),

    radial-gradient(
        ellipse 320px 90px at 25% 100%,
        rgba(255,230,200,0.20) 0%,
        rgba(255,230,200,0.10) 50%,
        transparent 100%
    ),

    radial-gradient(
        ellipse 280px 80px at 50% 100%,
        rgba(255,240,220,0.18) 0%,
        rgba(255,240,220,0.08) 50%,
        transparent 100%
    ),

    radial-gradient(
        ellipse 350px 100px at 75% 100%,
        rgba(255,230,190,0.20) 0%,
        rgba(255,230,190,0.10) 50%,
        transparent 100%
    ),

    radial-gradient(
        ellipse 250px 70px at 95% 100%,
        rgba(255,240,220,0.22) 0%,
        rgba(255,240,220,0.12) 45%,
        transparent 100%
    );

    filter: blur(5px);
    opacity: 0.8;

    pointer-events:none;
}

/* ================= SUNSET GLOW ================= */

#groundBack::before{
    content:"";
    position:absolute;
    left:0;
    right:0;
    top:0;
    height:120px;

    background:
        linear-gradient(
            to bottom,
            rgba(255,220,160,0.20),
            transparent
        );

    pointer-events:none;
}

/* ================= PREMIUM GROUND ================= */

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:100px;

    background:
        /* batu kecil */
        radial-gradient(circle, rgba(180,180,180,.4) 2px, transparent 3px),
        radial-gradient(circle, rgba(120,120,120,.35) 2px, transparent 3px),

    repeating-linear-gradient(
        90deg,
        #D9A441 0px,
        #D9A441 40px,
        #C98F2D 40px,
        #C98F2D 80px
    );


    background-size:
        80px 40px,
        120px 60px,
        50px 100px;

    border-top:6px solid #F4D35E;

    box-shadow:
        inset 0 10px rgba(255,255,255,.15),
        inset 0 -10px rgba(0,0,0,.15);

    z-index:2;
}
/* ================= SCORE BOARD ================= */

#score{
    position:absolute;
    top:20px;
    left:50%;

    transform:translateX(-50%);

    padding:10px 25px;

    font-size:30px;
    font-weight:bold;
    color:white;

    border-radius:20px;

    background:rgba(181,111,45,0.35);

    border:2px solid rgba(255,210,120,0.4);

    box-shadow:
    0 0 15px rgba(255,180,80,0.3),
    0 4px 20px rgba(0,0,0,0.25);

    text-shadow:
        0 0 5px gold,
        0 0 10px orange;

    z-index:100;

    transition:transform 0.2s;
    backdrop-filter: blur(10px)
}

#highScore{
    position:absolute;
    top:76px;
    left:50%;
    transform:translateX(-50%);
    padding:6px 18px;
    border-radius:18px;
    color:#fff6c7;
    font-size:15px;
    font-weight:800;
    background:rgba(22,23,55,0.35);
    border:1px solid rgba(255,215,79,0.5);
    box-shadow:
        0 0 14px rgba(255,213,79,0.24),
        0 4px 18px rgba(0,0,0,0.22);
    text-shadow:0 0 8px rgba(255,213,79,0.9);
    z-index:100;
    backdrop-filter: blur(8px);
}

.obstacle,
.bird,
.cloud,
#player,
#sun{
    will-change:transform;
}
/* ================= SCORE POP ================= */

.score-pop{
    animation:scorePop 0.3s ease;
}

@keyframes scorePop{

    0%{
        transform:translateX(-50%) scale(1);
    }

    50%{
        transform:translateX(-50%) scale(1.18);
        text-shadow:
            0 0 10px yellow,
            0 0 20px gold,
            0 0 40px orange;
    }

    100%{
        transform:translateX(-50%) scale(1);
    }
}

.best-score-label{

    color:rgba(255,245,190,.8);

    font-size:13px;

    letter-spacing:2px;

    margin-top:4px;
}

.best-score{

    color:#FFD54F;

    font-size:30px;
    font-weight:900;

    text-shadow:
        0 0 12px rgba(255,213,79,.8);
}
/* ================= RESTART SCREEN ================= */

#gameOver{
    position:absolute;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);

    z-index:999;
}

/* ================= CARD ================= */

.gameover-card{

    width:min(90%,420px);

    padding:35px;

    border-radius:30px;

    text-align:center;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.15);

    backdrop-filter:blur(15px);

    box-shadow:
        0 15px 40px rgba(0,0,0,.35);

    animation:gameOverShow .4s ease;
}

/* ================= TITLE ================= */

.gameover-title{

    font-size:48px;
    font-weight:900;

    background:linear-gradient(
        180deg,
        #FFD54F,
        #FF9800,
        #E65100
    );

    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;

    margin-bottom:10px;
}

/* ================= SCORE ================= */

.final-score-label{

    color:rgba(255,255,255,.7);

    font-size:16px;

    letter-spacing:2px;

    margin-top:10px;
}

.final-score{

    font-size:60px;
    font-weight:900;

    color:white;

    margin:10px 0;

    text-shadow:
        0 0 15px gold;
}

/* ================= MESSAGE ================= */

.gameover-message{

    color:rgba(255,255,255,.8);

    margin-bottom:25px;

    font-size:15px;
}

/* ================= SHOW ================= */

@keyframes gameOverShow{

    from{
        opacity:0;
        transform:translateY(40px) scale(.9);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* ================= RESTART BUTTON ================= */

#restartBtn{
    margin-top:20px;

    padding:14px 45px;

    border:none;
    border-radius:50px;

    cursor:pointer;

    font-size:20px;
    font-weight:700;
    letter-spacing:1px;

    color:white;

    background:linear-gradient(
        135deg,
        #FFD54F 0%,   /* siang */
        #FF9800 45%,  /* senja */
        #3949AB 100%  /* malam */
    );

    box-shadow:
        0 0 15px rgba(255,180,0,.4),
        0 0 30px rgba(57,73,171,.3),
        0 6px 20px rgba(0,0,0,.3);

    transition:
        transform .25s ease,
        box-shadow .25s ease;

    animation:restartPulse 2s infinite;

    position:relative;
    overflow:hidden;
}

/* efek cahaya bergerak */
#restartBtn::before{
    content:"";

    position:absolute;
    top:0;
    left:-150%;

    width:60%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.4),
        transparent
    );

    transform:skewX(-25deg);

    animation:shine 3s infinite;
}

/* hover */
#restartBtn:hover{
    transform:scale(1.08);

    box-shadow:
        0 0 25px rgba(255,180,0,.7),
        0 0 50px rgba(57,73,171,.5),
        0 10px 25px rgba(0,0,0,.4);
}

/* klik */
#restartBtn:active{
    transform:scale(.95);
}

/* glow berdenyut */
@keyframes restartPulse{

    0%{
        box-shadow:
            0 0 15px rgba(255,180,0,.4),
            0 0 30px rgba(57,73,171,.3);
    }

    50%{
        box-shadow:
            0 0 30px rgba(255,180,0,.8),
            0 0 60px rgba(57,73,171,.6);
    }

    100%{
        box-shadow:
            0 0 15px rgba(255,180,0,.4),
            0 0 30px rgba(57,73,171,.3);
    }
}

/* kilatan cahaya */
@keyframes shine{

    0%{
        left:-150%;
    }

    100%{
        left:200%;
    }
}
/* ================= SUN ================= */
#sun{
    position:absolute;
    left:0;
    top:0;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#FFD700;
    box-shadow:0 0 30px #FFD700;
}

/* ================= SHAKE ================= */
@keyframes shake{
    0%{transform:translateX(0)}
    25%{transform:translateX(-6px)}
    50%{transform:translateX(6px)}
    75%{transform:translateX(-4px)}
    100%{transform:translateX(0)}
}

.shake{
    animation:shake 0.4s;
}

/* ================= MENU / LOBBY ================= */

#menu{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(2px);

    z-index:200;
}

/* ================= JUDUL ================= */

#menu h1{

    font-size:72px;
    font-weight:900;
    font-family:Arial, sans-serif;

    margin-bottom:10px;

    background:linear-gradient(
        90deg,
        #FFD700,
        #FFA500,
        #FFFFFF,
        #87CEFA
    );

    background-size:300% 300%;

    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;

    text-align:center;

    text-shadow:
        0 0 15px rgba(255,215,0,0.5),
        0 0 30px rgba(255,165,0,0.4);

    animation:
        titleFloat 3s ease-in-out infinite,
        titleGlow 5s linear infinite;
}

/* ================= SUBTITLE ================= */

#menu p{

    color:white;

    font-size:20px;

    letter-spacing:3px;

    margin-bottom:30px;

    text-shadow:
        0 0 10px rgba(255,255,255,0.7);

    animation:subtitleFade 2s ease-in-out infinite;
}

/* ================= START BUTTON ================= */

#startBtn{

    padding:15px 50px;

    border:none;
    border-radius:50px;

    font-size:24px;
    font-weight:bold;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        135deg,
        #FFD700,
        #FFA500
    );

    box-shadow:
        0 0 20px rgba(255,215,0,0.6);

    transition:0.3s;
}

#startBtn:hover{

    transform:scale(1.1);

    box-shadow:
        0 0 35px rgba(255,215,0,0.9);
}

/* ================= ANIMATION ================= */

@keyframes titleFloat{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-12px);
    }
}

@keyframes titleGlow{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

@keyframes subtitleFade{

    0%,100%{
        opacity:0.7;
    }

    50%{
        opacity:1;
    }
}
/* ================= CLOUD ================= */
.cloud{
    position:absolute;
    background:white;
    border-radius:50px;
    opacity:0.8;
    z-index:2;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    pointer-events:none;
}

.cloud.small{ width:80px; height:30px; }
.cloud.medium{ width:130px; height:45px; }
.cloud.large{ width:180px; height:60px; }
</style>
</head>

<body>

<div id="game">
    <div id="score">⭐ 0</div>
    <div id="highScore">BEST 0</div>
    <div id="player">
    <div class="head"></div>
    <div class="body"></div>
    <div class="arm arm-left"></div>
    <div class="arm arm-right"></div>
    <div class="leg leg-left"></div>
    <div class="leg leg-right"></div>
</div>

    <div id="sun"></div>

    <div id="groundBack"></div>
    <div id="ground"></div>

    <div id="gameOver">

    <div class="gameover-card">

        <div class="gameover-title">
            SOLAR DASH
        </div>

        <div class="final-score-label">
            FINAL SCORE
        </div>

        <div id="finalScore" class="final-score">
            0
        </div>

        <div class="best-score-label">BEST SCORE</div>

        <div id="finalHighScore" class="best-score">0</div>

        <div class="gameover-message">
            Every Sunset Brings Another Chance.
        </div>

        <button id="restartBtn">
            🔄 RESTART
        </button>

    </div>

</div>

    <div id="menu">
                <h1 id="gameTitle">
     SOLAR DASH 
</h1>

<p id="subtitle">
    Run Through Day And Night
</p>
        <button id="startBtn">START</button>
    </div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const scoreText = document.getElementById("score");
const highScoreText = document.getElementById("highScore");
const gameOverText = document.getElementById("gameOver");
const menu = document.getElementById("menu");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const sun = document.getElementById("sun");
const ground = document.getElementById("ground");
const groundBack = document.getElementById("groundBack");
const finalScoreText = document.getElementById("finalScore");
const finalHighScoreText = document.getElementById("finalHighScore");

/* ================= STATE ================= */
let playing = false;
let score = 0;
let speed = 6;
let lastFrameTime = 0;
let lastSunFrame = 0;
let lastSkyUpdate = 0;
let obstacleSpawnTimer = 0;
let cloudSpawnTimer = 0;
let nextObstacleDelay = 1500;

const obstacles = [];
const clouds = [];

const PLAYER_X = 80;
const PLAYER_WIDTH = 40;
const PLAYER_HEIGHT = 80;
const PLAYER_BASE_BOTTOM = 100;

let highScore = loadHighScore();

/* ================= PLAYER ================= */
let y = 0;
let velocity = 0;
let gravity = 0.9;
let jumpPower = 18;
let jumping = false;
let rotation = 0;

/* ================= GROUND ================= */
let groundOffset = 0;
let groundBackOffset = 0;

let sunLoopStarted = false;

/* ================= SUN ================= */
const cycleTime = 100000;
let t = 0;

const points = [
    { x: 0.001, y: 0.99 },
    { x: 0.50, y: 0.12 },
    { x: 0.99, y: 0.99 },
    { x: 0.50, y: 0.08 }
];

const skyColors = [
    ["#FFD89B","#87CEEB"],
    ["#87CEEB","#BFEFFF"],
    ["#FF9966","#FF5E62"],
    ["#0B132B","#1C2541"]
];

function loadHighScore(){
    try{
        const saved = Number(localStorage.getItem("solarDashHighScore"));
        return Number.isFinite(saved) ? saved : 0;
    }catch(error){
        return 0;
    }
}

function saveHighScore(){
    try{
        localStorage.setItem("solarDashHighScore", String(highScore));
    }catch(error){}
}

function updateScoreDisplay(){
    scoreText.innerText = "⭐ " + score;
    highScoreText.innerText = "BEST " + highScore;
}

function playScorePop(){
    scoreText.animate([
        { transform:"translateX(-50%) scale(1)", textShadow:"0 0 5px gold, 0 0 10px orange" },
        { transform:"translateX(-50%) scale(1.18)", textShadow:"0 0 10px yellow, 0 0 20px gold, 0 0 40px orange" },
        { transform:"translateX(-50%) scale(1)", textShadow:"0 0 5px gold, 0 0 10px orange" }
    ], { duration:300, easing:"ease" });
}

function resetGame(){
    playing = false;
    game.classList.remove("is-playing");

    score = 0;
    speed = 6;
    y = 0;
    velocity = 0;
    jumping = false;
    rotation = 0;
    groundOffset = 0;
    groundBackOffset = 0;
    obstacleSpawnTimer = 0;
    cloudSpawnTimer = 0;
    nextObstacleDelay = 1200;
    lastFrameTime = 0;
    lastSunFrame = 0;
    lastSkyUpdate = 0;
    t = 0;

    updateScoreDisplay();

    obstacles.length = 0;
    clouds.length = 0;

    document
        .querySelectorAll(".obstacle,.bird,.cloud")
        .forEach(e => e.remove());

    gameOverText.style.display = "none";
    menu.style.display = "none";

    game.classList.add("is-playing");
    playing = true;
    requestAnimationFrame(gameLoop);

    if(!sunLoopStarted){
        sunLoopStarted = true;
        animateSun();
    }
}

/* ================= INPUT ================= */
function jump(){
    if(!playing) return;

    if(!jumping || y < 4){
        velocity = jumpPower;
        jumping = true;
    }
}

document.addEventListener("touchstart", (e) => {
    if(!playing) return;
    e.preventDefault();
    jump();
}, { passive:false });

document.addEventListener("mousedown",jump);
document.addEventListener("keydown", (e) => {
    if(e.code === "Space"){
        e.preventDefault();

        if(!e.repeat){
            jump();
        }
    }
});

/* ================= GAME LOOP ================= */
function gameLoop(timestamp){
    if(!playing) return;

    if(!lastFrameTime) lastFrameTime = timestamp;
    const delta = Math.min(timestamp - lastFrameTime, 32);
    const step = delta / 16.67;
    lastFrameTime = timestamp;

    updatePlayer(step);
    updateGround(step);
    updateObstacles(delta, step);
    updateClouds(delta, step);

    requestAnimationFrame(gameLoop);
}

function updatePlayer(step){
    velocity -= gravity * step;
    y += velocity * step;

    if(y <= 0){
        y = 0;
        velocity = 0;
        jumping = false;
        rotation = 0;
    } else {
        rotation = (rotation + 10 * step) % 360;
    }

    player.style.transform = `translateY(${-y}px) rotate(${rotation}deg)`;
}

function updateGround(step){
    groundOffset -= speed * step;
    groundBackOffset -= speed * 0.4 * step;

    ground.style.backgroundPosition = groundOffset + "px 0";
    groundBack.style.backgroundPosition = groundBackOffset + "px 0";
}

/* ================= OBSTACLE ================= */
function spawnObstacle(){
    const isBird = Math.random() < 0.3;
    const obs = document.createElement("div");
    obs.className = isBird ? "bird" : "obstacle";
    if(isBird) obs.innerHTML = "🦅";

    obs.style.left = "0px";
    obs.style.transform = `translateX(${window.innerWidth}px)`;
    game.appendChild(obs);

    obstacles.push({
        el: obs,
        x: window.innerWidth,
        width: isBird ? 70 : 50,
        height: isBird ? 70 : 100,
        bottom: isBird ? 200 : 100,
        passed: false
    });
}

function updateObstacles(delta, step){
    obstacleSpawnTimer += delta;

    if(obstacleSpawnTimer >= nextObstacleDelay){
        obstacleSpawnTimer = 0;
        nextObstacleDelay = 1200 + Math.random() * 1000;
        spawnObstacle();
    }

    for(let i = obstacles.length - 1; i >= 0; i--){
        const obs = obstacles[i];
        obs.x -= speed * step;
        obs.el.style.transform = `translateX(${obs.x}px)`;

        if(!obs.passed && obs.x + obs.width < PLAYER_X){
            obs.passed = true;
            score++;

            if(score > highScore){
                highScore = score;
                saveHighScore();
            }

            updateScoreDisplay();
            playScorePop();

            if(score % 5 === 0) speed = Math.min(speed + 0.3, 15);
        }

        if(checkCollision(obs)){
            obs.el.remove();
            obstacles.splice(i,1);
            gameOver();
            return;
        }

        if(obs.x < -140){
            obs.el.remove();
            obstacles.splice(i,1);
        }
    }
}

function checkCollision(obs){
    const playerLeft = PLAYER_X + 7;
    const playerRight = PLAYER_X + PLAYER_WIDTH - 7;
    const playerBottom = PLAYER_BASE_BOTTOM + y + 4;
    const playerTop = playerBottom + PLAYER_HEIGHT - 8;

    const obsLeft = obs.x;
    const obsRight = obs.x + obs.width;
    const obsBottom = obs.bottom;
    const obsTop = obs.bottom + obs.height;

    return playerLeft < obsRight &&
           playerRight > obsLeft &&
           playerBottom < obsTop &&
           playerTop > obsBottom;
}

/* ================= SUN + SKY ================= */
function lerp(a,b,t){return a+(b-a)*t;}

function hexToRgb(hex){
    const n=parseInt(hex.replace("#",""),16);
    return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}

function rgbToStr(r,g,b){
    return `rgb(${r},${g},${b})`;
}

function lerpColor(a,b,t){
    const A=hexToRgb(a);
    const B=hexToRgb(b);
    return rgbToStr(
        lerp(A.r,B.r,t),
        lerp(A.g,B.g,t),
        lerp(A.b,B.b,t)
    );
}

function animateSun(timestamp = 0){
    if(!playing){
        lastSunFrame = 0;
        requestAnimationFrame(animateSun);
        return;
    }

    if(!lastSunFrame) lastSunFrame = timestamp;
    const delta = Math.min(timestamp - lastSunFrame, 32);
    lastSunFrame = timestamp;
    t += delta;

    let p=(t%cycleTime)/cycleTime;

    let i=Math.floor(p*4);
    let next=(i+1)%4;
    let local=p*4-i;

    let x=points[i].x+(points[next].x-points[i].x)*local;
    let y=points[i].y+(points[next].y-points[i].y)*local;

    sun.style.transform=`translate(${x*window.innerWidth}px, ${y*window.innerHeight}px)`;

    if(timestamp - lastSkyUpdate > 100){
        const top=lerpColor(skyColors[i][0],skyColors[next][0],local);
        const bottom=lerpColor(skyColors[i][1],skyColors[next][1],local);

        game.style.background=`linear-gradient(${top},${bottom})`;
        lastSkyUpdate = timestamp;
    }

    requestAnimationFrame(animateSun);
}

/* ================= CLOUD ================= */
function spawnCloud(){
    const cloud = document.createElement("div");
    cloud.className = "cloud medium";

    const x = window.innerWidth + Math.random() * 200;
    const y = Math.random() * 300;

    cloud.style.left = "0px";
    cloud.style.top = y + "px";
    cloud.style.transform = `translateX(${x}px)`;

    game.appendChild(cloud);
    clouds.push({ el: cloud, x, speed: 1 + Math.random() * 2 });
}

function updateClouds(delta, step){
    cloudSpawnTimer += delta;

    if(cloudSpawnTimer >= 2500){
        cloudSpawnTimer = 0;
        spawnCloud();
    }

    for(let i = clouds.length - 1; i >= 0; i--){
        const c = clouds[i];
        c.x -= c.speed * step;
        c.el.style.transform = `translateX(${c.x}px)`;

        if(c.x < -220){
            c.el.remove();
            clouds.splice(i,1);
        }
    }
}

/* ================= GAME OVER ================= */
function gameOver(){
    if(!playing) return;

    playing = false;
    game.classList.remove("is-playing");
    game.classList.add("shake");
    setTimeout(()=>game.classList.remove("shake"),400);

    if(score > highScore){
        highScore = score;
        saveHighScore();
        updateScoreDisplay();
    }

    gameOverText.style.display = "flex";
    finalScoreText.innerText = score;
    finalHighScoreText.innerText = highScore;
}

/* ================= START ================= */
updateScoreDisplay();
startBtn.addEventListener("click",()=>resetGame());
restartBtn.addEventListener("click",()=>resetGame());
</script>
